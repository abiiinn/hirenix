<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hirenix Recruitment{% endblock %}</title>
    <!-- Tailwind CSS (CDN for simple setup with arbitrary values) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Tailwind slate-50 */
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen text-slate-800 selection:bg-blue-200 selection:text-blue-900">

    {% include 'includes/navbar.html' %}

    <main class="flex-grow container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t py-8 mt-auto">
        <div class="container mx-auto px-4 text-center text-sm text-slate-500 flex flex-col items-center">
            <div class="flex items-center gap-2 font-semibold text-slate-700 mb-2">
                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                Hirenix
            </div>
            &copy; 2026 Hirenix Recruitment System. All rights reserved. Building the future of AI-driven hiring.
        </div>
    </footer>

    <!-- Toastify JS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        {% if messages %}
            {% for message in messages %}
                Toastify({
                    text: "{{ message }}",
                    duration: 4000,
                    close: true,
                    gravity: "bottom", // `top` or `bottom`
                    position: "right", // `left`, `center` or `right`
                    stopOnFocus: true, // Prevents dismissing of toast on hover
                    style: {
                        background: "{% if message.tags == 'success' %}linear-gradient(to right, #10b981, #34d399){% elif message.tags == 'error' %}linear-gradient(to right, #ef4444, #f87171){% else %}linear-gradient(to right, #3b82f6, #60a5fa){% endif %}",
                        borderRadius: "8px",
                        boxShadow: "0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)"
                    }
                }).showToast();
            {% endfor %}
        {% endif %}
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
