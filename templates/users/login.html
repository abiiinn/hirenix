{% extends 'base.html' %}

{% block title %}Sign In - Hirenix{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 border border-gray-200 rounded-2xl shadow-xl">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
        <p class="text-gray-500">Sign in to your Hirenix account</p>
    </div>

    <form method="POST" action="{% url 'users:login' %}" class="space-y-6">
        {% csrf_token %}

        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" id="username" name="username" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                placeholder="Enter your username">
        </div>

        <div>
            <div class="flex items-center justify-between mb-1">
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <a href="{% url 'password_reset' %}"
                    class="text-sm font-semibold text-blue-600 hover:text-blue-500 hover:underline">Forgot password?</a>
            </div>
            <input type="password" id="password" name="password" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                placeholder="••••••••">
        </div>

        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-all focus:ring-4 focus:ring-blue-200">
            Sign In
        </button>
    </form>

    <div class="mt-8 text-center text-sm text-gray-500">
        Don't have an account?
        <a href="{% url 'users:register' %}"
            class="font-semibold text-blue-600 hover:text-blue-500 hover:underline transition">Create one</a>
    </div>
</div>
{% endblock %}
