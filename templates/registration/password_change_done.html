{% extends 'base.html' %}

{% block title %}Password Changed - Hirenix{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-8 bg-white rounded-lg shadow-md border border-gray-100 text-center">
    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
        <svg class="h-6 w-6 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
    </div>
    <h2 class="text-2xl font-bold mb-2 text-gray-800">Password Changed Successfully!</h2>
    <p class="text-gray-600 mb-6">Your password has been changed successfully.</p>

    <a href="{% url 'users:profile' %}"
        class="inline-flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
        Return to Profile
    </a>
</div>
{% endblock %}
